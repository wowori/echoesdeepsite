<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Track your Echoes, modifiers and rank in Deepwoken. Plan your run to S or W rank with the full list of Echo Triumphs.">
    <meta name="theme-color" content="#0a1a1f">
    <title>Echo Tracker — Deepwoken</title>
    <style>
        :root {
            --bg: #0a1a1f;
            --text: #e0f0f5;
            --accent: #2596be;
            --border: #1c3d47;
            --hover: #152d35;
            --checked: #00e699;
            --card-bg: rgba(10, 30, 40, 0.7);
            --shadow: rgba(0, 0, 0, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 20px;
            margin: 0;
            background-image: url('https://static.wikia.nocookie.net/project-deepwoken/images/c/ca/Depths_New_Lightning.png/revision/latest/scale-to-width-down/1000?cb=mod');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-blend-mode: overlay;
            backdrop-filter: blur(2px);
            min-height: 100vh;
        }

        /* Two-column app layout: sticky sidebar + scrolling task list */
        .app-layout {
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 20px;
            max-width: 1600px;
            margin: 0 auto;
            align-items: start;
        }

        .sidebar {
            position: sticky;
            top: 20px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding-right: 6px;
            /* nicer scrollbar on Webkit */
            scrollbar-width: thin;
            scrollbar-color: var(--accent) transparent;
        }
        .sidebar::-webkit-scrollbar { width: 8px; }
        .sidebar::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 4px;
        }
        .sidebar::-webkit-scrollbar-track { background: transparent; }

        .content {
            min-width: 0; /* allow grid item to shrink below content size */
        }

        /* Make tasks the scrollable area so the header stays pinned */
        .tasks-scroll {
            max-height: calc(100vh - 40px);
            overflow-y: auto;
            border-radius: 8px;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) transparent;
        }
        .tasks-scroll::-webkit-scrollbar { width: 10px; }
        .tasks-scroll::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 5px;
        }
        .tasks-scroll::-webkit-scrollbar-track { background: rgba(20, 60, 70, 0.3); }

        header {
            text-align: center;
            padding: 16px;
            background: linear-gradient(135deg, rgba(10, 30, 40, 0.8), rgba(5, 20, 30, 0.8));
            border-radius: 10px;
            box-shadow: 0 4px 12px var(--shadow);
            backdrop-filter: blur(4px);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 6px;
            color: var(--accent);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        header p { font-size: 0.9rem; opacity: 0.8; }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stat-box {
            background: var(--card-bg);
            padding: 12px 14px;
            border-radius: 8px;
            text-align: center;
            min-width: 0;
            box-shadow: 0 2px 8px var(--shadow);
            backdrop-filter: blur(2px);
            border: 1px solid rgba(106, 212, 255, 0.2);
        }

        .stat-box h3 {
            font-size: 0.8rem;
            margin-bottom: 6px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-box .value {
            font-size: 1.6rem;
            font-weight: bold;
            color: var(--accent);
            line-height: 1.1;
        }

        .rank-display {
            background: var(--card-bg);
            padding: 14px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 8px var(--shadow);
            backdrop-filter: blur(2px);
            border: 1px solid rgba(106, 212, 255, 0.2);
        }

        .rank-display .rank {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 6px 0;
            color: var(--accent);
            text-shadow: 0 0 10px currentColor;
            line-height: 1;
        }

        .rank-display .range {
            font-size: 0.85rem;
            opacity: 0.8;
        }

        .modifiers-section {
            background: var(--card-bg);
            padding: 14px;
            border-radius: 8px;
            box-shadow: 0 2px 8px var(--shadow);
            backdrop-filter: blur(2px);
            border: 1px solid rgba(106, 212, 255, 0.2);
        }

        .modifiers-section h3 {
            margin-bottom: 10px;
            color: var(--accent);
            text-align: center;
            font-size: 1rem;
        }

        .modifier-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .modifier-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            background: rgba(20, 60, 70, 0.3);
            border-radius: 6px;
            border: 1px solid rgba(106, 212, 255, 0.1);
        }

        .modifier-item label {
            font-size: 0.85rem;
            flex-grow: 1;
            cursor: pointer;
        }

        .modifier-item .multiplier {
            font-size: 0.8rem;
            color: var(--accent);
            font-weight: bold;
            white-space: nowrap;
        }

        .tasks-container {
            background: var(--card-bg);
            border-radius: 8px;
            /* No overflow here — would break sticky thead */
            box-shadow: 0 4px 12px var(--shadow);
            backdrop-filter: blur(2px);
            border: 1px solid rgba(106, 212, 255, 0.2);
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }

        th, td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            background-color: rgba(20, 60, 70, 0.95);
            font-weight: bold;
            position: sticky;
            top: 0;
            backdrop-filter: blur(6px);
            z-index: 2;
        }

        /* First column of the header should have rounded top-left corner */
        th:first-child {
            border-top-left-radius: 8px;
        }
        th:last-child {
            border-top-right-radius: 8px;
        }

        tr:hover {
            background-color: var(--hover);
        }

        .checkbox-cell {
            text-align: center;
        }

        .checkbox-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .custom-checkbox {
            position: relative;
            width: 24px;
            height: 24px;
            border: 2px solid var(--accent);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: transparent;
            appearance: none;
            -webkit-appearance: none;
            display: inline-block;
            vertical-align: middle;
            flex-shrink: 0;
        }

        .custom-checkbox:hover {
            border-color: var(--checked);
        }

        .custom-checkbox:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .custom-checkbox:checked {
            background-color: var(--checked);
            border-color: var(--checked);
        }

        .custom-checkbox:checked::after {
            content: '';
            position: absolute;
            left: 7px;
            top: 3px;
            width: 6px;
            height: 12px;
            border: 2px solid var(--bg);
            border-top: 0;
            border-left: 0;
            transform: rotate(45deg);
        }

        .task-description {
            line-height: 1.4;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .echo-value {
            font-weight: bold;
            color: var(--accent);
            text-align: center;
        }

        .reset-btn, .github-btn, .contact-btn {
            background-color: #333;
            color: var(--text);
            border: none;
            padding: 9px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
            backdrop-filter: blur(2px);
            border: 1px solid var(--border);
            display: block;
            width: 100%;
            text-align: center;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .reset-btn {
            background-color: #ff6b6b;
        }

        .reset-btn:hover {
            background-color: #ff5252;
        }

        .github-btn:hover {
            background-color: #444;
        }

        .contact-btn {
            background-color: #0077b6;
        }

        .contact-btn:hover {
            background-color: #005f9e;
        }

        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        @media (max-width: 900px) {
            .app-layout {
                grid-template-columns: 1fr;
            }
            .sidebar {
                position: static;
                max-height: none;
            }
            .tasks-scroll {
                max-height: none;
            }
        }

        @media (max-width: 768px) {
            body { padding: 12px; }
            h1 { font-size: 1.6rem; }
            .stat-box .value { font-size: 1.4rem; }
            th, td {
                padding: 8px 10px;
                font-size: 0.9rem;
            }
            .rank-display .rank { font-size: 2.2rem; }
        }

        @media (max-width: 480px) {
            th, td { padding: 6px 8px; font-size: 0.85rem; }
            .stat-box { padding: 10px; }
            .stat-box .value { font-size: 1.25rem; }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <header>
                <h1>Echo Tracker</h1>
                <p>We block, parry and dodge</p>
            </header>

            <div class="stats">
                <div class="stat-box">
                    <h3>Total Echoes</h3>
                    <div class="value" id="totalEchoes">0</div>
                </div>
                <div class="stat-box">
                    <h3>With Modifiers</h3>
                    <div class="value" id="totalEchoesWithModifiers">0</div>
                </div>
                <div class="stat-box">
                    <h3>Completed</h3>
                    <div class="value" id="completedTasks">0</div>
                </div>
                <div class="stat-box">
                    <h3>Total Tasks</h3>
                    <div class="value" id="totalTasks">0</div>
                </div>
            </div>

            <div class="rank-display">
                <h3>Your Rank</h3>
                <div class="rank" id="currentRank">E</div>
                <div class="range" id="rankRange">0–29</div>
            </div>

            <div class="modifiers-section">
                <h3>Modifiers</h3>
                <div class="modifier-list" id="modifiersList">
                    <!-- Modifiers will be injected via JS -->
                </div>
            </div>

            <div class="buttons-container">
                <button class="reset-btn" id="resetBtn">Reset All Progress</button>
                <a href="https://github.com/wowori/echoesdeepsite" target="_blank" rel="noopener noreferrer" class="github-btn">GitHub</a>
                <a href="mailto:farkash10@bk.ru" class="contact-btn">Contact</a>
            </div>
        </aside>

        <main class="content">
            <div class="tasks-scroll">
                <div class="tasks-container">
                    <table id="tasksTable">
                        <thead>
                            <tr>
                                <th>✅</th>
                                <th>Echo</th>
                                <th>Task / Requirement</th>
                            </tr>
                        </thead>
                        <tbody id="tasksBody">
                            <!-- Tasks will be injected via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Task data
        const tasks = [
            { id: 1, echo: 1, description: "Crafting a Food item." },
            { id: 2, echo: 1, description: "Catching a Fish (or anything using a Fishing Rod)." },
            { id: 3, echo: 1, description: "Modifying a Mantra." },
            { id: 4, echo: 1, description: "Turning in a Pure Ore to a Blacksmith. (except for pure iron)" },
            { id: 5, echo: 1, description: "Winning Chime of Conflict match." },
            { id: 6, echo: 2, description: "Drinking an Attribute Flask (NOT an Attunement Potion)." },
            { id: 7, echo: 2, description: "Crafting a Master Armor." },
            { id: 8, echo: 2, description: "Using a Deep Shrine." },
            { id: 9, echo: 2, description: "Making a deal with Misérables." },
            { id: 10, echo: 2, description: "Bargaining with Yun'Shul (e.g., rerolling Resonance). (idol of Yun'Shul counts.)" },
            { id: 11, echo: 5, description: "Unbonding an Attribute." },
            { id: 12, echo: 5, description: "Obtaining an Oath." },
            { id: 13, echo: 5, description: "Soul-bounding an enchanted or legendary item (e.g., Hero Blade of Frost, Crypt Blade)." },
            { id: 14, echo: 5, description: "Enchanting an Item with an Enchant Stone or Enchant Grease (Do not use it on an enchanted weapon)." },
            { id: 15, echo: 5, description: "Obtaining an enchant from Laplace." },
            { id: 16, echo: 5, description: "Using Pluripotent Alloy (requires 75 weapon requirement for most weapons)." },
            { id: 17, echo: 5, description: "Obtaining a Murmur." },
            { id: 18, echo: 5, description: "Defeating Dread Serpent OR The Doom of Caeranthil" },
            { id: 19, echo: 5, description: "Defeating Duke Erisia" },
            { id: 20, echo: 5, description: "Defeating The Ferryman" },
            { id: 21, echo: 5, description: "Defeating Chaser" },
            { id: 22, echo: 5, description: "Defeating Primadon OR Elder Primadon" },
            { id: 23, echo: 5, description: "Clear a World Event — Interluminary Parasol OR Doom of Caeranthil OR Carnival of Hearts." },
            { id: 24, echo: 10, description: "Defeating Scion of Ethiron." },
            { id: 25, echo: 10, description: "Completing Hell Mode." },
            { id: 26, echo: 10, description: "Completing Layer 2 floor 1 without Light Hook." },
            { id: 27, echo: 15, description: "Gaining 20 Power (every Power level up will award you with 0.75 Echoes, being 15 at 20 Power level)" },
            { id: 28, echo: 15, description: "Obtaining a Resonance. (You must CHOOSE it. If you reroll in Fragments of Self, it resets the task, even if you had one before.)" }
        ];

        // Modifier data
        // NOTE: Ironwoken and Vow of Thorns were removed with the Vow of Iron update (Dec 13, 2025).
        // Source: https://deepwoken.fandom.com/wiki/Echoes
        // Currently 12 modifiers available, total cumulative 3.1x to Echo gain.
        const modifiers = [
            { id: 'fragile_heart', name: 'Fragile Heart', effect: 'All incoming mob damage is doubled.', multiplier: 0.5 },
            { id: 'crestfallen', name: 'Crestfallen', effect: 'Your armor is permanently broken.', multiplier: 0.1 },
            { id: 'deep_champion', name: 'Deep Champion', effect: 'Your Depths trial is always corrupted.', multiplier: 0.2 },
            { id: 'dissonant', name: 'Dissonant', effect: 'You are unable to draw forth your Resonance. (You can still obtain one, but you cannot use it.)', multiplier: 0.3 },
            { id: 'hollow', name: 'Hollow', effect: 'All overworld deaths send you to the Depths.', multiplier: 0.1 },
            { id: 'slowburn', name: 'Slowburn', effect: 'All incoming healing is heavily reduced.', multiplier: 0.1 },
            { id: 'dealbreaker', name: 'Dealbreaker', effect: 'You sell items for 25% less.', multiplier: 0.05 },
            { id: 'loose_change', name: 'Loose Change', effect: 'All damage received makes you lose notes on hit.', multiplier: 0.2 },
            { id: 'high_velocity', name: 'High Velocity', effect: 'All fall damage is heavily amplified, allowing you to die from falls much easier.', multiplier: 0.1 },
            { id: 'one_bit', name: 'One Bit', effect: 'You don\'t know how to swim.', multiplier: 0.2 },
            { id: 'destined', name: 'Destined', effect: 'You don\'t get to choose what you get when your Power increases. Fate picks for you.', multiplier: 0.2 },
            { id: 'glass_bones', name: 'Glass Bones', effect: 'Taking any damage will immediately knock you. Only pick this if you wish to embark on an unforgiving challenge.', multiplier: 0 }
        ];

        // Ranks (per https://deepwoken.fandom.com/wiki/Echoes)
        // Rank is determined by BASE echoes (before modifier multipliers).
        // W: 140 base + all Echo Triumphs done + every modifier except Glass Bones enabled
        //     (effective echoes with mods = 427)
        // S: 140 base + all Echo Triumphs done
        // A: 112–139, B: 87–111, C: 60–86, D: 30–59, E: 0–29
        const ranks = [
            { rank: 'W', min: 140, max: 140, note: '140 base — requires all Echo Triumphs & every modifier except Glass Bones' },
            { rank: 'S', min: 140, max: 140, note: '140 base — requires all Echo Triumphs' },
            { rank: 'A', min: 112, max: 139, note: '112–139' },
            { rank: 'B', min: 87, max: 111, note: '87–111' },
            { rank: 'C', min: 60, max: 86, note: '60–86' },
            { rank: 'D', min: 30, max: 59, note: '30–59' },
            { rank: 'E', min: 0, max: 29, note: '0–29' }
        ];

        // DOM elements
        const tasksBody = document.getElementById('tasksBody');
        const totalEchoesEl = document.getElementById('totalEchoes');
        const totalEchoesWithModifiersEl = document.getElementById('totalEchoesWithModifiers');
        const completedTasksEl = document.getElementById('completedTasks');
        const totalTasksEl = document.getElementById('totalTasks');
        const currentRankEl = document.getElementById('currentRank');
        const rankRangeEl = document.getElementById('rankRange');
        const modifiersList = document.getElementById('modifiersList');
        const resetBtn = document.getElementById('resetBtn');

        // Initialize
        let completed = {};
        let activeModifiers = {};

        // Load from localStorage
        function loadProgress() {
            const saved = localStorage.getItem('echoTracker');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    completed = data.completed || {};
                    activeModifiers = data.activeModifiers || {};
                } catch (e) {
                    completed = {};
                    activeModifiers = {};
                }
            }
        }

        // Save to localStorage
        function saveProgress() {
            const data = {
                completed,
                activeModifiers
            };
            localStorage.setItem('echoTracker', JSON.stringify(data));
        }

        // Get rank by BASE echoes (no multipliers) and completion state
        // Ranks A–E are based purely on base echoes.
        // S additionally requires all Echo Triumphs.
        // W additionally requires S + every modifier enabled EXCEPT Glass Bones.
        function getRank(baseEchoes, allTasksDone, allModsExceptGlassBones) {
            // Check W first (most restrictive)
            if (baseEchoes >= 140 && allTasksDone && allModsExceptGlassBones) {
                return ranks[0]; // W
            }
            if (baseEchoes >= 140 && allTasksDone) {
                return ranks[1]; // S
            }
            // A through E
            for (let i = 2; i < ranks.length; i++) {
                const r = ranks[i];
                if (baseEchoes >= r.min && baseEchoes <= r.max) {
                    return r;
                }
            }
            return ranks[ranks.length - 1]; // E
        }

        // Calculate total multiplier
        function getTotalMultiplier() {
            let multiplier = 1.0; // Base multiplier
            for (const modId in activeModifiers) {
                if (activeModifiers[modId]) {
                    const mod = modifiers.find(m => m.id === modId);
                    if (mod) {
                        multiplier += mod.multiplier;
                    }
                }
            }
            return multiplier;
        }

        // Update stats
        function updateStats() {
            let totalEchoes = 0; // base echoes (used for rank)
            let completedCount = 0;

            tasks.forEach(task => {
                if (completed[task.id]) {
                    totalEchoes += task.echo;
                    completedCount++;
                }
            });

            const allTasksDone = completedCount === tasks.length;

            // Total modifier multiplier — game sums them additively (1 + 0.5 + 0.1 + ...)
            const multiplier = getTotalMultiplier();
            const totalWithModifiers = totalEchoes * multiplier;

            totalEchoesEl.textContent = totalEchoes;
            totalEchoesWithModifiersEl.textContent = formatEchoes(totalWithModifiers);
            completedTasksEl.textContent = completedCount;
            totalTasksEl.textContent = tasks.length;

            // W requires every modifier except Glass Bones enabled
            const nonGlassModifiers = modifiers.filter(m => m.id !== 'glass_bones');
            const allModsExceptGlassBones = nonGlassModifiers.every(m => activeModifiers[m.id]);

            const rank = getRank(totalEchoes, allTasksDone, allModsExceptGlassBones);
            currentRankEl.textContent = rank.rank;
            rankRangeEl.textContent = rank.note;
        }

        // Format echo numbers (Power gives 0.75 per level → 15.0 at Power 20)
        function formatEchoes(value) {
            // Round to nearest tenth, mirroring the in-game display rounding
            return (Math.round(value * 10) / 10).toFixed(1).replace(/\.0$/, '');
        }

        // Render tasks table
        function renderTasks() {
            tasksBody.innerHTML = '';

            tasks.forEach(task => {
                const row = document.createElement('tr');

                // Checkbox cell
                const checkboxCell = document.createElement('td');
                checkboxCell.className = 'checkbox-cell';
                const checkboxWrapper = document.createElement('div');
                checkboxWrapper.className = 'checkbox-wrapper';
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.className = 'custom-checkbox';
                checkbox.dataset.id = task.id;
                checkbox.checked = !!completed[task.id];
                checkbox.setAttribute('aria-label', `Mark task "${task.description}" as done`);
                checkbox.addEventListener('change', toggleTask);
                checkboxWrapper.appendChild(checkbox);
                checkboxCell.appendChild(checkboxWrapper);

                // Echo value cell
                const echoCell = document.createElement('td');
                echoCell.className = 'echo-value';
                echoCell.textContent = task.echo;

                // Description cell
                const descCell = document.createElement('td');
                descCell.className = 'task-description';
                descCell.textContent = task.description;

                row.appendChild(checkboxCell);
                row.appendChild(echoCell);
                row.appendChild(descCell);

                tasksBody.appendChild(row);
            });
        }

        // Render modifiers
        function renderModifiers() {
            modifiersList.innerHTML = '';

            modifiers.forEach(mod => {
                const item = document.createElement('div');
                item.className = 'modifier-item';

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.className = 'custom-checkbox';
                checkbox.id = `mod-${mod.id}`;
                checkbox.dataset.id = mod.id;
                checkbox.checked = !!activeModifiers[mod.id];
                checkbox.setAttribute('aria-label', `${mod.name}: ${mod.effect}`);

                const label = document.createElement('label');
                label.htmlFor = `mod-${mod.id}`;
                label.textContent = mod.name;
                label.title = mod.effect;

                const multiplierSpan = document.createElement('span');
                multiplierSpan.className = 'multiplier';
                multiplierSpan.textContent = `+${Math.round(mod.multiplier * 100)}%`;

                checkbox.addEventListener('change', toggleModifier);

                item.appendChild(checkbox);
                item.appendChild(label);
                item.appendChild(multiplierSpan);

                modifiersList.appendChild(item);
            });
        }

        // Toggle task
        function toggleTask(e) {
            const checkbox = e.target;
            const taskId = parseInt(checkbox.dataset.id, 10);
            if (checkbox.checked) {
                completed[taskId] = true;
            } else {
                delete completed[taskId];
            }
            saveProgress();
            updateStats();
        }

        // Toggle modifier
        function toggleModifier(e) {
            const checkbox = e.target;
            const modId = checkbox.dataset.id;
            activeModifiers[modId] = checkbox.checked;
            saveProgress();
            updateStats();
        }

        // Reset all progress
        function resetAll() {
            if (confirm("Are you sure you want to reset ALL progress?")) {
                completed = {};
                activeModifiers = {};
                saveProgress();
                renderTasks();
                renderModifiers();
                updateStats();
            }
        }

        // Init
        loadProgress();
        renderTasks();
        renderModifiers();
        updateStats();

        // Reset button handler
        resetBtn.addEventListener('click', resetAll);
    </script>
</body>
</html>
